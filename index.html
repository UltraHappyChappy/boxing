<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SANDBAG STRIKER</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --ring: #1a1a2e;
  --gold: #f5c518;
  --red: #e63946;
  --hit: #ff6b35;
  --perfect: #00f5d4;
  --good: #f5c518;
  --miss: #6b6b6b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Barlow Condensed', sans-serif;
  overflow: hidden;
  user-select: none;
  touch-action: none;
}

#wrapper {
  position: relative;
  width: 420px;
  height: 700px;
}

canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  border-radius: 20px;
}

/* 画面シェイク */
@keyframes shake {
  0%   { transform: translate(0,0) rotate(0deg); }
  15%  { transform: translate(-8px, 4px) rotate(-1deg); }
  30%  { transform: translate(8px, -4px) rotate(1deg); }
  45%  { transform: translate(-6px, 6px) rotate(-0.5deg); }
  60%  { transform: translate(6px, -2px) rotate(0.5deg); }
  75%  { transform: translate(-3px, 3px) rotate(-0.2deg); }
  90%  { transform: translate(3px, -1px) rotate(0.1deg); }
  100% { transform: translate(0,0) rotate(0deg); }
}
@keyframes shake-heavy {
  0%   { transform: translate(0,0) rotate(0deg) scale(1); }
  10%  { transform: translate(-14px, 8px) rotate(-2deg) scale(1.01); }
  20%  { transform: translate(14px, -8px) rotate(2deg) scale(0.99); }
  35%  { transform: translate(-10px, 10px) rotate(-1.5deg) scale(1.01); }
  50%  { transform: translate(10px, -4px) rotate(1deg) scale(1); }
  65%  { transform: translate(-5px, 5px) rotate(-0.5deg); }
  80%  { transform: translate(5px, -2px) rotate(0.2deg); }
  100% { transform: translate(0,0) rotate(0deg) scale(1); }
}
.shake       { animation: shake 0.25s ease; }
.shake-heavy { animation: shake-heavy 0.4s ease; }

/* ボタン */
#hitBtn {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 130px;
  height: 130px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ff6b35, #c0392b);
  border: 6px solid #ff8c5a;
  box-shadow:
    0 0 0 4px rgba(255,107,53,0.3),
    0 0 40px rgba(255,107,53,0.5),
    inset 0 -8px 20px rgba(0,0,0,0.5),
    inset 0 4px 8px rgba(255,255,255,0.2);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: transform 0.05s, box-shadow 0.05s;
  z-index: 100;
  -webkit-tap-highlight-color: transparent;
}
#hitBtn:active, #hitBtn.pressing {
  transform: translateX(-50%) scale(0.9);
  box-shadow:
    0 0 0 2px rgba(255,107,53,0.2),
    0 0 20px rgba(255,107,53,0.3),
    inset 0 4px 20px rgba(0,0,0,0.6);
}
#hitBtn .btn-label {
  font-family: 'Black Ops One', cursive;
  font-size: 22px;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  letter-spacing: 0.05em;
}
#hitBtn .btn-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.2em;
  margin-top: 4px;
}

/* HUD */
#hud {
  position: fixed;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 420px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 18px 20px 0;
  pointer-events: none;
  z-index: 50;
}
.hud-block { text-align: center; }
.hud-label {
  font-size: 11px;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
}
.hud-val {
  font-family: 'Black Ops One', cursive;
  font-size: 36px;
  color: #fff;
  line-height: 1;
  text-shadow: 0 0 20px rgba(245,197,24,0.5);
}
#comboDisplay {
  font-family: 'Black Ops One', cursive;
  font-size: 22px;
  color: var(--gold);
  text-shadow: 0 0 15px var(--gold);
  letter-spacing: 0.05em;
}

/* ===== 結果画面 ===== */
#resultScreen {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
}
#resultScreen.show { display: flex; }
.result-title {
  font-family: 'Black Ops One', cursive;
  font-size: 22px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.3em;
  margin-bottom: 8px;
}
.result-rank {
  font-family: 'Black Ops One', cursive;
  font-size: 68px;
  line-height: 1;
  margin: 4px 0;
  text-shadow: 0 0 40px currentColor;
  animation: rankIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes rankIn {
  from { transform: scale(0.3); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
.result-label {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.15em;
  margin-bottom: 20px;
}
.result-score-row {
  display: flex; gap: 40px; margin: 16px 0;
}
.result-stat { text-align: center; }
.result-stat .rv {
  font-family: 'Black Ops One', cursive;
  font-size: 42px; color: #fff;
}
.result-stat .rl { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 0.2em; }
.result-best-badge {
  font-family: 'Black Ops One', cursive;
  font-size: 18px; color: #f5c518;
  text-shadow: 0 0 20px #f5c518;
  margin-bottom: 8px;
  animation: pulse2 0.6s infinite alternate;
  display: none;
}
@keyframes pulse2 { from{opacity:0.6} to{opacity:1} }
.result-bar-wrap {
  width: 300px; margin: 16px 0;
}
.result-bar-label {
  display: flex; justify-content: space-between;
  font-size: 12px; color: rgba(255,255,255,0.4);
  margin-bottom: 4px; letter-spacing: 0.1em;
}
.result-bar-track {
  height: 10px; background: rgba(255,255,255,0.1);
  border-radius: 5px; overflow: hidden;
}
.result-bar-fill {
  height: 100%; border-radius: 5px;
  transition: width 1s cubic-bezier(0.22,1,0.36,1);
  width: 0%;
}
.btn-retry {
  margin-top: 24px;
  padding: 14px 50px;
  font-family: 'Black Ops One', cursive;
  font-size: 22px;
  background: radial-gradient(circle at 35% 35%, #ff6b35, #c0392b);
  color: #fff;
  border: none; border-radius: 40px;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(255,107,53,0.5);
  letter-spacing: 0.1em;
  transition: transform 0.1s;
}
.btn-retry:active { transform: scale(0.93); }

/* カウントダウン */
#countdownOverlay {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.75);
  z-index: 180;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
#countdownOverlay.show { display: flex; }
#countNum {
  font-family: 'Black Ops One', cursive;
  font-size: 140px;
  color: #ff6b35;
  text-shadow: 0 0 60px #ff6b35;
  animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes popIn { from{transform:scale(1.8);opacity:0} to{transform:scale(1);opacity:1} }
#countdownOverlay p {
  font-size: 18px; color: rgba(255,255,255,0.5);
  letter-spacing: 0.3em; margin-top: 16px;
}

/* タイム警告 */
#timeVal.danger { color: #e63946 !important; animation: timeDanger 0.4s infinite alternate; }
@keyframes timeDanger { from{transform:scale(1)} to{transform:scale(1.15)} }


#gaugeWrap {
  position: fixed;
  bottom: 170px;
  left: 50%;
  transform: translateX(-50%);
  width: 340px;
  z-index: 100;
  pointer-events: none;
}
#gaugeTrack {
  position: relative;
  height: 28px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  overflow: hidden;
}
#gaugeGood {
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  width: 41%;
  transform: translateX(-50%);
  background: rgba(245,197,24,0.45);
  border-radius: 14px;
}
#gaugePerfect {
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  width: 14%;
  transform: translateX(-50%);
  background: rgba(0,245,212,0.8);
  border-radius: 14px;
}
#gaugeCursor {
  position: absolute;
  top: 50%;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  background: #fff;
  border: 3px solid #fff;
  box-shadow: 0 0 10px rgba(255,255,255,0.8);
  transition: background 0.05s;
  left: 50%;
}
#gaugeLabels {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 0 4px;
}
</style>

<body>

<div id="hud">
  <div class="hud-block">
    <div class="hud-label">SCORE</div>
    <div class="hud-val" id="scoreVal">0</div>
  </div>
  <div class="hud-block" style="text-align:center;">
    <div class="hud-label">TIME</div>

    <div class="hud-label">BEST</div>

</div>
<div id="comboWrap" style="position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:50;pointer-events:none;text-align:center;">
  <div id="comboDisplay" style="font-family:'Black Ops One',cursive;font-size:22px;color:#f5c518;letter-spacing:0.05em;">—</div>
</div>

<!-- カウントダウン -->
<div id="countdownOverlay">
  <div id="countNum">3</div>
  <p>TAP TO PUNCH</p>
</div>

<!-- 結果画面 -->
<div id="resultScreen">
  <div class="result-title">RESULT</div>
  <div class="result-rank" id="resultRankEmoji">🥊</div>
  <div class="result-label" id="resultRankLabel">FIGHTER</div>
  <div class="result-best-badge" id="resultBestBadge">🏆 NEW RECORD!</div>
  <div class="result-score-row">
    <div class="result-stat">
      <div class="rv" id="resultScore">0</div>
      <div class="rl">SCORE</div>
    </div>
    <div class="result-stat">
      <div class="rv" id="resultCombo">0</div>
      <div class="rl">MAX COMBO</div>
    </div>
    <div class="result-stat">
      <div class="rv" id="resultBest">0</div>
      <div class="rl">BEST</div>
    </div>
  </div>
  <div class="result-bar-wrap">
    <div class="result-bar-label"><span>PERFECT</span><span id="resultPerfectCount">0回</span></div>
    <div class="result-bar-track"><div class="result-bar-fill" id="resultPerfectBar" style="background:#00f5d4;"></div></div>
  </div>
  <div class="result-bar-wrap" style="margin-top:-8px;">
    <div class="result-bar-label"><span>GOOD</span><span id="resultGoodCount">0回</span></div>
    <div class="result-bar-track"><div class="result-bar-fill" id="resultGoodBar" style="background:#f5c518;"></div></div>
  </div>
  <button class="btn-retry" onclick="startCountdown()">RETRY</button>
</div>

<div id="wrapper">
  <canvas id="bg"></canvas>
  <canvas id="game"></canvas>
  <canvas id="fx"></canvas>
</div>

<div id="gaugeWrap">
  <div id="gaugeTrack">
    <div id="gaugeGood"></div>
    <div id="gaugePerfect"></div>
    <div id="gaugeCursor"></div>
  </div>
  <div id="gaugeLabels">
    <span style="color:rgba(255,255,255,0.25)">MISS</span>
    <span style="color:#f5c518">GOOD</span>
    <span style="color:#00f5d4">PERFECT</span>
    <span style="color:#f5c518">GOOD</span>
    <span style="color:rgba(255,255,255,0.25)">MISS</span>
  </div>
</div>
<button id="hitBtn">
  <span class="btn-label">HIT</span>
  <span class="btn-sub">TAP TO PUNCH</span>
</button>

<script>
// =============================================
// キャンバスセットアップ
// =============================================
const W = 420, H = 700;
const bgC   = document.getElementById('bg');
const gameC = document.getElementById('game');
const fxC   = document.getElementById('fx');
[bgC, gameC, fxC].forEach(c => { c.width = W; c.height = H; });
const bg  = bgC.getContext('2d');
const gc  = gameC.getContext('2d');
const fx  = fxC.getContext('2d');

// =============================================
// Web Audio
// =============================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playPunch(type) {
  const ctx = getAudio();
  const now = ctx.currentTime;

  if (type === 'perfect') {
    // 重低音 + 高音のシャープな打撃
    [0, 0.01, 0.025].forEach((offset, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      const freq = [80, 140, 60][i];
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(freq, now + offset);
      o.frequency.exponentialRampToValueAtTime(freq * 0.3, now + offset + 0.18);
      g.gain.setValueAtTime(0, now + offset);
      g.gain.linearRampToValueAtTime([0.6, 0.4, 0.5][i], now + offset + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, now + offset + 0.22);
      o.connect(g); g.connect(ctx.destination);
      o.start(now + offset); o.stop(now + offset + 0.25);
    });
    // 高音のクラック
    const crack = ctx.createOscillator();
    const crackG = ctx.createGain();
    crack.type = 'square';
    crack.frequency.setValueAtTime(800, now);
    crack.frequency.exponentialRampToValueAtTime(200, now + 0.08);
    crackG.gain.setValueAtTime(0.35, now);
    crackG.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    crack.connect(crackG); crackG.connect(ctx.destination);
    crack.start(now); crack.stop(now + 0.12);
    // ノイズ
    addNoise(ctx, now, 0.3, 0.15);

  } else if (type === 'good') {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(110, now);
    o.frequency.exponentialRampToValueAtTime(40, now + 0.14);
    g.gain.setValueAtTime(0.5, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    o.connect(g); g.connect(ctx.destination);
    o.start(now); o.stop(now + 0.2);
    addNoise(ctx, now, 0.2, 0.1);

  } else {
    // miss / weak
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(200, now);
    o.frequency.exponentialRampToValueAtTime(80, now + 0.1);
    g.gain.setValueAtTime(0.15, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    o.connect(g); g.connect(ctx.destination);
    o.start(now); o.stop(now + 0.15);
  }
}

function addNoise(ctx, now, vol, dur) {
  const bufLen = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);
  const src = ctx.createBufferSource();
  const g = ctx.createGain();
  src.buffer = buf;
  g.gain.setValueAtTime(vol, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + dur);
  src.connect(g); g.connect(ctx.destination);
  src.start(now);
}

function playComboSound(combo) {
  const ctx = getAudio();
  const now = ctx.currentTime;
  // コンボ時の上昇音
  const notes = [523, 659, 784, 1047, 1319];
  const n = Math.min(combo - 1, notes.length - 1);
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(notes[n], now);
  g.gain.setValueAtTime(0.2, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
  o.connect(g); g.connect(ctx.destination);
  o.start(now); o.stop(now + 0.14);
}

// =============================================
// ゲーム状態
// =============================================
let score = 0;
let bestScore = parseInt(localStorage.getItem('boxing_best') || '0');
let combo = 0;
let maxCombo = 0;
let frame = 0;
let lastHitTime = 0;
let gameState = 'countdown'; // countdown | playing | result
let timeLeft = 10;
let timerInterval = null;
let perfectCount = 0;
let goodCount = 0;

// 称号定義
const RANKS = [
  { min:0,    emoji:'😴', label:'ねこパンチ',         color:'#aaa' },
  { min:500,  emoji:'🐣', label:'ビギナー',           color:'#8BC34A' },
  { min:1000, emoji:'👊', label:'ストリートファイター', color:'#4CAF50' },
  { min:1500, emoji:'🥊', label:'アマチュア',         color:'#2196F3' },
  { min:2000, emoji:'⚡', label:'プロボクサー',       color:'#9C27B0' },
  { min:2500, emoji:'🔥', label:'チャンピオン',       color:'#ff6b35' },
  { min:3000, emoji:'💥', label:'レジェンド',         color:'#f5c518' },
  { min:3500, emoji:'👑', label:'神の拳',             color:'#00f5d4' },
];
function getRank(s) {
  let r = RANKS[0];
  for (const rk of RANKS) { if (s >= rk.min) r = rk; }
  return r;
}

// サンドバッグ物理
const BAG = {
  x: W / 2,
  anchorY: 130,
  length: 160,
  angle: 0,       // ラジアン（0=垂直）
  vel: 0,         // 角速度
  damping: 0.988,
  gravity: 0.0015,

  // ゾーン定義（角度の絶対値）
  PERFECT_ZONE: 0.22,  // ±この範囲内で打つと最高
  GOOD_ZONE: 0.65,

  get tipX() { return this.x + Math.sin(this.angle) * this.length; },
  get tipY() { return this.anchorY + Math.cos(this.angle) * this.length; },
  get bagCX() { return this.x + Math.sin(this.angle) * (this.length * 0.7); },
  get bagCY() { return this.anchorY + Math.cos(this.angle) * (this.length * 0.7); },
};

// バッグのサイズ
const BAG_W = 68, BAG_H = 120;

// スクワッシュ・ストレッチ
let squashX = 1, squashY = 1;
let squashVel = 0;

// パーティクル
let particles = [];
let floatTexts = [];
let screenFlash = 0;
let screenFlashColor = '#fff';
let impactRings = [];
let sparks = [];
let bgShockwaves = [];

// =============================================
// 判定
// =============================================
function getJudge() {
  // angleを -π〜π に正規化（一回転しても正しく判定）
  let norm = BAG.angle % (Math.PI * 2);
  if (norm > Math.PI)  norm -= Math.PI * 2;
  if (norm < -Math.PI) norm += Math.PI * 2;
  const a = Math.abs(norm);

  // 上側（|angle| > π/2）は必ずMISS
  if (a > Math.PI * 0.5) return 'MISS';

  // ゲージのゾーンと同じ判定
  if (a <= BAG.PERFECT_ZONE) return 'PERFECT'; // 水色ゾーン
  if (a <= BAG.GOOD_ZONE)    return 'GOOD';    // 黄色ゾーン
  return 'MISS';                                // 透明ゾーン
}

// =============================================
// ヒット処理
// =============================================
function onHit(e) {
  if (e && e.preventDefault) e.preventDefault();
  if (gameState !== 'playing') return;
  getAudio();

  const judge = getJudge();
  const now = Date.now();
  lastHitTime = now;

  if (judge === 'PERFECT') {
    combo++;
    perfectCount++;
    const pts = 100 * Math.min(combo, 10);
    score += pts;
    maxCombo = Math.max(maxCombo, combo);

    // バッグを強く押す
    const dir = (Math.random() < 0.5 ? 1 : -1);
    BAG.vel += dir * (0.08 + Math.random() * 0.04);

    // エフェクト
    triggerPerfect(pts);
    playPunch('perfect');
    if (combo >= 2) playComboSound(combo);

    // 画面シェイク（重め）
    doShake('heavy');

  } else if (judge === 'GOOD') {
    combo++;
    goodCount++;
    const pts = 40 * Math.min(combo, 10);
    score += pts;
    maxCombo = Math.max(maxCombo, combo);

    const dir = (Math.random() < 0.5 ? 1 : -1);
    BAG.vel += dir * (0.05 + Math.random() * 0.03);

    triggerGood(pts);
    playPunch('good');
    if (combo >= 3) playComboSound(combo);

    doShake('normal');

  } else {
    // MISS
    combo = 0;
    const dir = (Math.random() < 0.5 ? 1 : -1);
    BAG.vel += dir * 0.015;

    triggerMiss();
    playPunch('miss');
  }

  // スコア更新
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('bestVal').textContent = Math.max(score, bestScore);
  updateComboDisplay();

  // ボタンエフェクト
  const btn = document.getElementById('hitBtn');
  btn.classList.add('pressing');
  setTimeout(() => btn.classList.remove('pressing'), 80);
}

function drawBackground() {
  bg.clearRect(0, 0, W, H);

  // 天井
  bg.fillStyle = '#080810';
  bg.fillRect(0, 0, W, H);

  // 床のグラデーション
  const floor = bg.createLinearGradient(0, H*0.55, 0, H);
  floor.addColorStop(0, '#1a1008');
  floor.addColorStop(1, '#0a0804');
  bg.fillStyle = floor;
  bg.fillRect(0, H*0.55, W, H);

  // スポットライト（複数）
  const spotGrd = bg.createRadialGradient(W/2, 0, 0, W/2, 0, 320);
  spotGrd.addColorStop(0, 'rgba(255,240,180,0.18)');
  spotGrd.addColorStop(0.4, 'rgba(255,220,120,0.08)');
  spotGrd.addColorStop(1, 'rgba(0,0,0,0)');
  bg.fillStyle = spotGrd;
  bg.fillRect(0, 0, W, H);

  // 天井レール
  bg.fillStyle = '#1c1c28';
  bg.fillRect(0, 0, W, 20);
  bg.fillStyle = '#252535';
  bg.fillRect(0, 18, W, 4);

  // スポットライト本体
  bg.fillStyle = '#333';
  bg.fillRect(W/2 - 16, 0, 32, 28);
  bg.fillStyle = '#555';
  bg.beginPath(); bg.arc(W/2, 22, 12, 0, Math.PI*2); bg.fill();
  bg.fillStyle = 'rgba(255,240,180,0.6)';
  bg.beginPath(); bg.arc(W/2, 22, 7, 0, Math.PI*2); bg.fill();

  // チェーン
  bg.strokeStyle = '#333';
  bg.lineWidth = 2;
  bg.setLineDash([4, 4]);
  bg.beginPath(); bg.moveTo(W/2, 30); bg.lineTo(W/2, BAG.anchorY - 5); bg.stroke();
  bg.setLineDash([]);

  // アンカー（天井の金具）
  bg.fillStyle = '#555';
  bg.beginPath(); bg.arc(W/2, BAG.anchorY - 2, 8, 0, Math.PI*2); bg.fill();
  bg.fillStyle = '#888';
  bg.beginPath(); bg.arc(W/2, BAG.anchorY - 2, 4, 0, Math.PI*2); bg.fill();

  // 壁のレンガっぽいテクスチャ（薄く）
  bg.strokeStyle = 'rgba(255,255,255,0.02)';
  bg.lineWidth = 1;
  for (let y = 0; y < H*0.55; y += 28) {
    for (let x = (y/28 % 2 === 0 ? 0 : 40); x < W; x += 80) {
      bg.strokeRect(x, y, 80, 28);
    }
  }

  // ゾーンインジケーター（地面のライン）
  const zoneY = H * 0.85;
  bg.strokeStyle = 'rgba(245,197,24,0.15)';
  bg.lineWidth = 2;
  bg.setLineDash([8, 8]);
  bg.beginPath(); bg.moveTo(0, zoneY); bg.lineTo(W, zoneY); bg.stroke();
  bg.setLineDash([]);
}

// =============================================
// サンドバッグ描画
// =============================================
function drawSandbag() {
  gc.save();
  gc.translate(BAG.bagCX, BAG.bagCY);
  gc.rotate(BAG.angle * 0.15); // バッグ自体も少し傾く

  // スクワッシュ・ストレッチ適用
  gc.scale(squashX, squashY);

  const hw = BAG_W / 2, hh = BAG_H / 2;

  // バッグの影（地面に投影）
  gc.save();
  gc.resetTransform();
  const shadowX = BAG.bagCX * 1;
  const shadowAlpha = 0.3 - Math.abs(BAG.angle) * 0.2;
  gc.translate(BAG.bagCX, H * 0.58);
  gc.scale(1 + Math.abs(BAG.angle), 0.25);
  gc.beginPath();
  gc.ellipse(0, 0, hw * 0.8, hw * 0.5, 0, 0, Math.PI * 2);
  gc.fillStyle = `rgba(0,0,0,${Math.max(0, shadowAlpha)})`;
  gc.fill();
  gc.restore();

  // バッグ本体（革っぽいテクスチャ）
  // 外側
  const bagGrd = gc.createLinearGradient(-hw, -hh, hw, hh);
  bagGrd.addColorStop(0, '#8B3A2A');
  bagGrd.addColorStop(0.3, '#C05030');
  bagGrd.addColorStop(0.5, '#D4603A');
  bagGrd.addColorStop(0.7, '#B04828');
  bagGrd.addColorStop(1, '#6A2818');
  gc.fillStyle = bagGrd;
  gc.beginPath();
  gc.roundRect(-hw, -hh, BAG_W, BAG_H, 28);
  gc.fill();

  // バンド（横線）
  gc.strokeStyle = 'rgba(0,0,0,0.35)';
  gc.lineWidth = 10;
  [-hh*0.4, 0, hh*0.4].forEach(oy => {
    gc.beginPath();
    gc.moveTo(-hw + 4, oy);
    gc.lineTo(hw - 4, oy);
    gc.stroke();
  });

  // バンドの金具
  gc.fillStyle = '#888';
  gc.fillRect(-3, -hh*0.4 - 2, 6, 4);
  gc.fillRect(-3, -2, 6, 4);
  gc.fillRect(-3, hh*0.4 - 2, 6, 4);

  // ハイライト（光沢）
  const hlGrd = gc.createLinearGradient(-hw, -hh, -hw*0.2, hh);
  hlGrd.addColorStop(0, 'rgba(255,255,255,0.22)');
  hlGrd.addColorStop(0.5, 'rgba(255,255,255,0.06)');
  hlGrd.addColorStop(1, 'rgba(255,255,255,0)');
  gc.fillStyle = hlGrd;
  gc.beginPath();
  gc.roundRect(-hw, -hh, BAG_W * 0.5, BAG_H, [28, 0, 0, 28]);
  gc.fill();

  // 縫い目
  gc.strokeStyle = 'rgba(80,30,10,0.6)';
  gc.lineWidth = 1.5;
  gc.setLineDash([5, 4]);
  gc.beginPath();
  gc.moveTo(0, -hh + 10);
  gc.lineTo(0, hh - 10);
  gc.stroke();
  gc.setLineDash([]);

  // 上部フック部分
  const hookGrd = gc.createLinearGradient(-8, -hh, 8, -hh - 20);
  hookGrd.addColorStop(0, '#666');
  hookGrd.addColorStop(1, '#aaa');
  gc.fillStyle = hookGrd;
  gc.beginPath();
  gc.roundRect(-8, -hh - 16, 16, 20, 4);
  gc.fill();

  gc.restore();
}

// =============================================
// FXキャンバス描画
// =============================================
function drawFX() {
  fx.clearRect(0, 0, W, H);

  // 背景衝撃波
  bgShockwaves = bgShockwaves.filter(sw => sw.life > 0.01);
  bgShockwaves.forEach(sw => {
    sw.r += 12;
    sw.life -= 0.06;
    fx.beginPath();
    fx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
    fx.strokeStyle = sw.color + sw.life * 0.5 + ')';
    fx.lineWidth = 3;
    fx.stroke();
  });

  // インパクトリング
  impactRings = impactRings.filter(r => r.life > 0.01);
  impactRings.forEach(r => {
    if (r.delay > 0) { r.delay--; return; }
    r.r += (r.maxR - r.r) * 0.18;
    r.life -= 0.05;
    fx.beginPath();
    fx.arc(r.x, r.y, Math.max(0, r.r), 0, Math.PI * 2);
    fx.strokeStyle = r.color;
    fx.globalAlpha = r.life * 0.8;
    fx.lineWidth = 3 * r.life;
    fx.stroke();
    fx.globalAlpha = 1;
  });

  // スパーク
  sparks = sparks.filter(s => s.life > 0.01);
  sparks.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.2;
    s.vx *= 0.96;
    s.life -= 0.035;

    fx.save();
    fx.globalAlpha = s.life;
    fx.fillStyle = s.color;
    if (s.type === 'star') {
      drawStar(fx, s.x, s.y, Math.max(0, s.r * s.life));
    } else {
      fx.beginPath();
      fx.arc(s.x, s.y, Math.max(0, s.r * s.life), 0, Math.PI * 2);
      fx.fill();
    }
    fx.restore();
  });

  // パーティクル
  particles = particles.filter(p => p.life > 0.01);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.94;
    p.life -= 0.03;

    fx.save();
    fx.globalAlpha = p.life;
    fx.fillStyle = p.color;
    fx.beginPath();
    fx.arc(p.x, p.y, Math.max(0, p.r * p.life), 0, Math.PI * 2);
    fx.fill();
    fx.restore();
  });

  // フローティングテキスト
  floatTexts = floatTexts.filter(t => t.life > 0.01);
  floatTexts.forEach(t => {
    t.y += t.vy;
    t.life -= 0.022;
    t.scale += (t.targetScale - t.scale) * 0.15;

    fx.save();
    fx.globalAlpha = Math.min(1, t.life * 2);
    fx.translate(t.x, t.y);
    fx.scale(t.scale, t.scale);
    fx.font = `900 ${t.size}px "Black Ops One", cursive`;
    fx.textAlign = 'center';
    fx.textBaseline = 'middle';
    // アウトライン
    fx.strokeStyle = t.outline;
    fx.lineWidth = 5;
    fx.lineJoin = 'round';
    fx.strokeText(t.text, 0, 0);
    // 本文
    fx.fillStyle = t.color;
    fx.fillText(t.text, 0, 0);
    fx.restore();
  });

  // 画面フラッシュ
  if (screenFlash > 0) {
    fx.fillStyle = screenFlashColor;
    fx.globalAlpha = screenFlash * 0.45;
    fx.fillRect(0, 0, W, H);
    fx.globalAlpha = 1;
    screenFlash -= 0.08;
  }
}

function drawStar(c, x, y, r) {
  c.save();
  c.translate(x, y);
  c.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    const innerAngle = angle + (2 * Math.PI) / 10;
    if (i === 0) c.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
    else c.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
    c.lineTo(Math.cos(innerAngle) * r * 0.4, Math.sin(innerAngle) * r * 0.4);
  }
  c.closePath();
  c.fill();
  c.restore();
}

// =============================================
// フィジクス更新
// =============================================
function updatePhysics() {
  // 振り子の物理（重力による角加速度）
  const angularAcc = -BAG.gravity * Math.sin(BAG.angle);
  BAG.vel += angularAcc;
  BAG.vel *= BAG.damping;
  BAG.angle += BAG.vel;

  // スクワッシュ回復
  squashX += (1 - squashX) * 0.2;
  squashY += (1 - squashY) * 0.2;
}

// =============================================
// 揺れに合わせた背景のパルス
// =============================================
let bgPulse = 0;
function updateBGPulse() {
  const speed = Math.abs(BAG.vel);
  bgPulse = Math.min(1, bgPulse + speed * 2);
  bgPulse *= 0.93;
}

// =============================================
// メインゲームキャンバス描画
// =============================================
function drawGame() {
  gc.clearRect(0, 0, W, H);

  // スポットライト（動的）
  const pulseA = bgPulse * 0.08;
  const spotGrd = gc.createRadialGradient(BAG.bagCX, BAG.bagCY + 20, 0, BAG.bagCX, BAG.bagCY + 20, 250);
  spotGrd.addColorStop(0, `rgba(255,240,180,${0.12 + pulseA})`);
  spotGrd.addColorStop(0.5, `rgba(255,220,120,${0.04 + pulseA * 0.5})`);
  spotGrd.addColorStop(1, 'rgba(0,0,0,0)');
  gc.fillStyle = spotGrd;
  gc.fillRect(0, 0, W, H);

  // ゾーンインジケーター
  drawZoneIndicator();

  // ロープ（バッグとアンカーを繋ぐ）
  gc.strokeStyle = '#555';
  gc.lineWidth = 3;
  gc.lineCap = 'round';
  gc.beginPath();
  gc.moveTo(W/2, BAG.anchorY);
  // バッグ上部へ
  const topX = BAG.bagCX + Math.sin(BAG.angle) * (-BAG_H/2 * 0.85);
  const topY = BAG.bagCY + Math.cos(BAG.angle) * (-BAG_H/2 * 0.85);
  gc.lineTo(topX, topY);
  gc.stroke();

  // バッグ
  drawSandbag();

  // バッグの周囲グロー（PERFECT ゾーン時）
  const absAngle = Math.abs(BAG.angle);
  if (absAngle <= BAG.PERFECT_ZONE) {
    const glow = gc.createRadialGradient(BAG.bagCX, BAG.bagCY, 0, BAG.bagCX, BAG.bagCY, 80);
    const intensity = (1 - absAngle / BAG.PERFECT_ZONE);
    glow.addColorStop(0, `rgba(0,245,212,${intensity * 0.3})`);
    glow.addColorStop(1, 'rgba(0,245,212,0)');
    gc.fillStyle = glow;
    gc.fillRect(BAG.bagCX - 80, BAG.bagCY - 80, 160, 160);

    // パーフェクトゾーン時のバッグ縁光り
    gc.save();
    gc.translate(BAG.bagCX, BAG.bagCY);
    gc.rotate(BAG.angle * 0.15);
    gc.strokeStyle = `rgba(0,245,212,${intensity * 0.8})`;
    gc.lineWidth = 3;
    gc.shadowColor = '#00f5d4';
    gc.shadowBlur = 20;
    gc.beginPath();
    gc.roundRect(-BAG_W/2, -BAG_H/2, BAG_W, BAG_H, 28);
    gc.stroke();
    gc.restore();
  }

  // 揺れの軌跡（残像）
  for (let i = 1; i <= 3; i++) {
    const trailAngle = BAG.angle - BAG.vel * i * 1.5;
    const tax = W/2 + Math.sin(trailAngle) * (BAG.length * 0.7);
    const tay = BAG.anchorY + Math.cos(trailAngle) * (BAG.length * 0.7);
    gc.save();
    gc.translate(tax, tay);
    gc.rotate(trailAngle * 0.15);
    gc.globalAlpha = (4 - i) * 0.06;
    gc.fillStyle = '#C05030';
    gc.beginPath();
    gc.roundRect(-BAG_W/2, -BAG_H/2, BAG_W, BAG_H, 28);
    gc.fill();
    gc.restore();
  }
}

// =============================================
// HTMLゲージ更新
// =============================================
const gaugeCursor = document.getElementById('gaugeCursor');
function updateGaugeDOM() {
  // angleを -π〜π に正規化
  let norm = BAG.angle % (Math.PI * 2);
  if (norm > Math.PI)  norm -= Math.PI * 2;
  if (norm < -Math.PI) norm += Math.PI * 2;

  // -π〜π を 0〜100% に変換
  const pct = (norm / Math.PI) * 50 + 50;

  gaugeCursor.style.left = pct + '%';

  // カーソル色
  const absN = Math.abs(norm);
  const PERFECT_ZONE = BAG.PERFECT_ZONE;
  const GOOD_ZONE = BAG.GOOD_ZONE;
  if (absN > Math.PI * 0.5) {
    gaugeCursor.style.background = '#444';
    gaugeCursor.style.borderColor = '#666';
    gaugeCursor.style.boxShadow = 'none';
  } else if (absN <= PERFECT_ZONE) {
    gaugeCursor.style.background = '#00f5d4';
    gaugeCursor.style.borderColor = '#00f5d4';
    gaugeCursor.style.boxShadow = '0 0 14px #00f5d4';
  } else if (absN <= GOOD_ZONE) {
    gaugeCursor.style.background = '#f5c518';
    gaugeCursor.style.borderColor = '#f5c518';
    gaugeCursor.style.boxShadow = '0 0 14px #f5c518';
  } else {
    gaugeCursor.style.background = 'rgba(255,255,255,0.25)';
    gaugeCursor.style.borderColor = 'rgba(255,255,255,0.3)';
    gaugeCursor.style.boxShadow = 'none';
  }
}

function startCountdown() {
  document.getElementById('resultScreen').classList.remove('show');
  score = 0; combo = 0; maxCombo = 0;
  perfectCount = 0; goodCount = 0;
  timeLeft = 10;
  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('timeVal').textContent = 10;
  document.getElementById('timeVal').classList.remove('danger');
  document.getElementById('comboDisplay').textContent = '—';
  gameState = 'countdown';

  const overlay = document.getElementById('countdownOverlay');
  const numEl = document.getElementById('countNum');
  overlay.classList.add('show');

  let n = 3;
  numEl.textContent = n;
  const tick = () => {
    numEl.style.animation = 'none';
    void numEl.offsetWidth;
    numEl.style.animation = 'popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275)';
    n--;
    if (n > 0) {
      numEl.textContent = n;
      setTimeout(tick, 700);
    } else {
      numEl.textContent = 'GO!';
      numEl.style.color = '#00f5d4';
      numEl.style.textShadow = '0 0 60px #00f5d4';
      setTimeout(() => {
        overlay.classList.remove('show');
        numEl.style.color = '#ff6b35';
        numEl.style.textShadow = '0 0 60px #ff6b35';
        startGame();
      }, 600);
    }
  };
  setTimeout(tick, 700);
}

function startGame() {
  gameState = 'playing';
  timerInterval = setInterval(() => {
    timeLeft--;
    const tv = document.getElementById('timeVal');
    tv.textContent = timeLeft;
    if (timeLeft <= 3) tv.classList.add('danger');
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);
}

function endGame() {
  gameState = 'result';
  saveScore();

  const rank = getRank(score);
  const isNew = score > 0 && score >= bestScore;

  const rs = document.getElementById('resultScreen');
  document.getElementById('resultRankEmoji').textContent = rank.emoji;
  document.getElementById('resultRankEmoji').style.color = rank.color;
  document.getElementById('resultRankLabel').textContent = rank.label;
  document.getElementById('resultRankLabel').style.color = rank.color;
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultCombo').textContent = maxCombo;
  document.getElementById('resultBest').textContent = bestScore;

  const badge = document.getElementById('resultBestBadge');
  badge.style.display = isNew ? 'block' : 'none';

  const total = perfectCount + goodCount || 1;
  document.getElementById('resultPerfectCount').textContent = perfectCount + '回';
  document.getElementById('resultGoodCount').textContent = goodCount + '回';

  setTimeout(() => {
    document.getElementById('resultPerfectBar').style.width = Math.min(100, perfectCount / total * 100) + '%';
    document.getElementById('resultGoodBar').style.width = Math.min(100, goodCount / total * 100) + '%';
  }, 300);

  rs.classList.add('show');

  // 2秒間はRETRYボタンを非表示（誤タップ防止）
  const retryBtn = document.querySelector('.btn-retry');
  retryBtn.style.opacity = '0';
  retryBtn.style.pointerEvents = 'none';
  setTimeout(() => {
    retryBtn.style.transition = 'opacity 0.5s';
    retryBtn.style.opacity = '1';
    retryBtn.style.pointerEvents = 'auto';
  }, 2000);
}

// =============================================
// スコア保存
// =============================================
function saveScore() {
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('boxing_best', bestScore);
    document.getElementById('bestVal').textContent = bestScore;
  }
}

// =============================================
// メインループ
// =============================================
let lastTime = 0;
function loop(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  frame++;

  updatePhysics();
  updateBGPulse();

  // 背景は毎フレーム描画（重いので1フレームおき）
  if (frame % 3 === 0) drawBackground();

  drawGame();
  drawFX();

  // 定期的にスコア保存
  // タイム切れ時は物理だけ動かす（バッグが止まらないように）

  // HTMLゲージ更新
  updateGaugeDOM();

  requestAnimationFrame(loop);
}

// =============================================
// 起動
// =============================================
// 初期の揺れを与える
BAG.vel = 0.04;
BAG.angle = 0.2;

document.getElementById('bestVal').textContent = bestScore;
drawBackground();
requestAnimationFrame(loop);
startCountdown();

// ===== 入力を一元管理（二重発火防止）=====
let hitCooldown = false;

function fireHit() {
  if (hitCooldown) return;
  hitCooldown = true;
  onHit({preventDefault: ()=>{}});
  // 150ms以内の連続入力を無視
  setTimeout(() => { hitCooldown = false; }, 80);
}

const btn = document.getElementById('hitBtn');

// タッチイベント（モバイル）
btn.addEventListener('touchstart', e => {
  e.preventDefault(); // mousedownの二重発火を防ぐ
  fireHit();
}, { passive: false });

// マウスイベント（PC）- touchstartが発火しなかった場合のみ
btn.addEventListener('mousedown', e => {
  if (e.sourceCapabilities && e.sourceCapabilities.firesTouchEvents) return;
  fireHit();
});

// キーボード
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'KeyZ' || e.code === 'KeyX') {
    e.preventDefault();
    fireHit();
  }
});
</script>
